      type="image/png"
      sizes="96x96"
      href="favicon/favicon-96x96.png">

<link rel="apple-touch-icon"
      href="favicon/apple-touch-icon.png">

<link rel="manifest"

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:#f8f8f8;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}

.box{

    background:#ffffff;

    width:100%;

    max-width:550px;

    padding:50px 40px;

    border-radius:25px;

    text-align:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);

    border:2px solid rgba(212,175,55,.15);
}

.icon{

    width:80px;
    height:80px;

    background:#d4af37;

    color:#fff;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    margin:0 auto 25px;

    font-size:2rem;

    font-weight:700;
}

h1{

    color:#111;

    font-size:2rem;

    margin-bottom:15px;
}

p{

    color:#666;

    line-height:1.8;

    margin-bottom:30px;
}

a{

    display:inline-block;

    background:#d4af37;

    color:#111;

    text-decoration:none;

    padding:14px 35px;

    border-radius:50px;

    font-weight:600;

    transition:.3s ease;
}

a:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 20px rgba(212,175,55,.25);
}

@media(max-width:768px){

    .box{

        padding:40px 25px;
    }

    h1{

        font-size:1.7rem;
    }

    p{

        font-size:.95rem;
    }
}

</style>

</head>

<body>

<div class="box">

<div class="icon">
✓
</div>

<h1>Inquiry Sent Successfully!</h1>

<p>
Thank you for contacting K Studio VX.
We have received your inquiry and our team will get back to you as soon as possible.
</p>

</a>

</div>

</body>
